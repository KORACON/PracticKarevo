<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TemoHotel — Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">🏨</div>
    <h1>TemoHotel</h1>
    <p class="subtitle">Система бронирования номеров</p>

    <div class="tabs">
      <button class="active" onclick="switchTab('login')">Вход</button>
      <button onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- ВХОД -->
    <div id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@hotel.ru" />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Войти</button>
      <div id="login-error" class="error-msg"></div>
      <p class="demo-hint">
        Демо-доступ:<br>
        <b>admin@hotel.ru</b> / <b>admin123</b><br>
        <b>client@hotel.ru</b> / <b>client123</b>
      </p>
    </div>

    <!-- РЕГИСТРАЦИЯ -->
    <div id="tab-register" style="display:none">
      <div class="form-group">
        <label>ФИО</label>
        <input type="text" id="reg-fio" placeholder="Иван Иванов" />
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="reg-phone" placeholder="79001234567" inputmode="numeric" maxlength="15" />
        <small style="color:#888;font-size:0.78em">Только цифры, например: 79001234567</small>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.ru" />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="reg-pass" placeholder="Минимум 6 символов" />
      </div>
      <button class="btn btn-success" style="width:100%" onclick="doRegister()">Зарегистрироваться</button>
      <div id="reg-msg" class="error-msg"></div>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
  // Если уже залогинен — редирект
  const sess = DB.getSession();
  if (sess) {
    location.href = sess.role === 'admin' ? 'admin.html' : 'client.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tabs button').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
  }

  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const user = DB.findUser(email, pass);
    if (!user) {
      document.getElementById('login-error').textContent = 'Неверный email или пароль';
      return;
    }
    DB.setSession(user);
    location.href = user.role === 'admin' ? 'admin.html' : 'client.html';
  }

  function doRegister() {
    const fio = document.getElementById('reg-fio').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const msg = document.getElementById('reg-msg');

    if (!fio || !email || !pass) { msg.textContent = 'Заполните все поля'; msg.className = 'error-msg'; return; }
    if (phone && !/^\d+$/.test(phone)) { msg.textContent = 'Телефон должен содержать только цифры'; msg.className = 'error-msg'; return; }
    if (phone && (phone.length < 10 || phone.length > 15)) { msg.textContent = 'Телефон: от 10 до 15 цифр'; msg.className = 'error-msg'; return; }
    if (pass.length < 6) { msg.textContent = 'Пароль минимум 6 символов'; msg.className = 'error-msg'; return; }

    const user = DB.registerUser({ fio, phone, email, password: pass });
    if (!user) { msg.textContent = 'Email уже зарегистрирован'; msg.className = 'error-msg'; return; }

    msg.textContent = 'Регистрация успешна! Войдите в систему.';
    msg.className = 'success-msg';
    setTimeout(() => switchTab('login'), 1500);
  }

  // Разрешаем только цифры в поле телефона
  document.getElementById('reg-phone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '');
  });

  // Enter для входа
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
