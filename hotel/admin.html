<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TemoHotel — Администратор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <img src="logo.png" alt="TemoHotel" class="header-logo" />
  <div class="user-info">
    <span id="user-name"></span>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="showPage('dashboard')">Обзор</button>
  <button onclick="showPage('rooms')">Номера</button>
  <button onclick="showPage('bookings')">Заявки на бронирование</button>
  <button onclick="showPage('clients')">Клиенты</button>
</div>

<div class="container">

  <!-- ОБЗОР -->
  <div id="page-dashboard" class="page active">
    <h2 style="margin-bottom:16px;color:#1a3a5c">Статистика</h2>
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="stat-rooms">0</div>
        <div class="lbl">Всего номеров</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-free">0</div>
        <div class="lbl">Свободно</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-bookings">0</div>
        <div class="lbl">Заявок</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-clients">0</div>
        <div class="lbl">Клиентов</div>
      </div>
    </div>
    <h3 style="margin-top:24px;margin-bottom:12px;color:#1a3a5c">Последние заявки</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Клиент</th><th>Номер</th><th>Заезд</th><th>Сумма</th><th>Статус</th></tr></thead>
        <tbody id="recent-bookings"></tbody>
      </table>
    </div>
  </div>

  <!-- НОМЕРА -->
  <div id="page-rooms" class="page">
    <div class="section-header">
      <h2>Управление номерами</h2>
      <button class="btn btn-success" onclick="openAddRoomModal()">+ Добавить номер</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Номер</th><th>Тип</th><th>Цена/ночь</th><th>Статус</th><th>Описание</th><th>Действия</th></tr></thead>
        <tbody id="rooms-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ЗАЯВКИ -->
  <div id="page-bookings" class="page">
    <div class="section-header"><h2>Заявки на бронирование</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Номер</th><th>Заезд</th><th>Выезд</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody id="bookings-body"></tbody>
      </table>
    </div>
  </div>

  <!-- КЛИЕНТЫ -->
  <div id="page-clients" class="page">
    <div class="section-header"><h2>Клиенты</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>ФИО</th><th>Email</th><th>Телефон</th><th>Бронирований</th></tr></thead>
        <tbody id="clients-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ НОМЕРА -->
<div class="modal-overlay" id="room-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeRoomModal()">×</button>
    <h2 id="room-modal-title">Добавить номер</h2>
    <div class="form-group">
      <label>Номер</label>
      <input type="text" id="room-number" placeholder="101" />
    </div>
    <div class="form-group">
      <label>Тип</label>
      <select id="room-type">
        <option>Стандарт</option>
        <option>Полулюкс</option>
        <option>Люкс</option>
      </select>
    </div>
    <div class="form-group">
      <label>Цена за ночь (₽)</label>
      <input type="number" id="room-price" placeholder="2500" />
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea id="room-desc" rows="3" placeholder="Краткое описание номера"></textarea>
    </div>
    <div id="room-error" class="error-msg"></div>
    <button class="btn btn-success" style="width:100%;margin-top:8px" onclick="saveRoom()">Сохранить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script>
  let currentUser = DB.getSession();
  let editingRoomId = null;

  if (!currentUser || currentUser.role !== 'admin') {
    location.href = 'index.html';
  }

  document.getElementById('user-name').textContent = currentUser.fio;

  function logout() { DB.clearSession(); location.href = 'index.html'; }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'dashboard') renderDashboard();
    if (name === 'rooms') renderRooms();
    if (name === 'bookings') renderBookings();
    if (name === 'clients') renderClients();
  }

  function renderDashboard() {
    const rooms = DB.getRooms();
    const bookings = DB.getBookings();
    const clients = DB.getUsers().filter(u => u.role === 'client');

    document.getElementById('stat-rooms').textContent = rooms.length;
    document.getElementById('stat-free').textContent = rooms.filter(r => r.status === 'свободен').length;
    document.getElementById('stat-bookings').textContent = bookings.filter(b => b.status === 'ожидает').length;
    document.getElementById('stat-clients').textContent = clients.length;

    const recent = bookings.slice(-5).reverse();
    document.getElementById('recent-bookings').innerHTML = recent.length === 0
      ? '<tr><td colspan="5" style="text-align:center;color:#888">Заявок нет</td></tr>'
      : recent.map(b => {
        const client = DB.getUsers().find(u => u.id === b.userId);
        return `<tr>
          <td>${client ? client.fio : '—'}</td>
          <td>${b.roomNumber}</td>
          <td>${b.checkin}</td>
          <td>${b.total.toLocaleString()} ₽</td>
          <td><span class="badge pending">${b.status}</span></td>
        </tr>`;
      }).join('');
  }

  function renderRooms() {
    const rooms = DB.getRooms();
    const tbody = document.getElementById('rooms-body');
    tbody.innerHTML = rooms.map(r => `<tr>
      <td>${r.number}</td>
      <td>${r.type}</td>
      <td>${r.price.toLocaleString()} ₽</td>
      <td><span class="badge ${r.status === 'свободен' ? 'free' : 'busy'}">${r.status}</span></td>
      <td>${r.description || '—'}</td>
      <td><div class="td-actions">
        <button class="btn btn-warning btn-sm" onclick="editRoom(${r.id})">Изменить</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRoom(${r.id})">Удалить</button>
      </div></td>
    </tr>`).join('');
  }

  function openAddRoomModal() {
    editingRoomId = null;
    document.getElementById('room-modal-title').textContent = 'Добавить номер';
    document.getElementById('room-number').value = '';
    document.getElementById('room-type').value = 'Стандарт';
    document.getElementById('room-price').value = '';
    document.getElementById('room-desc').value = '';
    document.getElementById('room-error').textContent = '';
    document.getElementById('room-modal').classList.add('open');
  }

  function editRoom(id) {
    const room = DB.getRooms().find(r => r.id === id);
    editingRoomId = id;
    document.getElementById('room-modal-title').textContent = 'Редактировать номер';
    document.getElementById('room-number').value = room.number;
    document.getElementById('room-type').value = room.type;
    document.getElementById('room-price').value = room.price;
    document.getElementById('room-desc').value = room.description || '';
    document.getElementById('room-error').textContent = '';
    document.getElementById('room-modal').classList.add('open');
  }

  function closeRoomModal() {
    document.getElementById('room-modal').classList.remove('open');
    editingRoomId = null;
  }

  function saveRoom() {
    const number = document.getElementById('room-number').value.trim();
    const type = document.getElementById('room-type').value;
    const price = parseInt(document.getElementById('room-price').value);
    const desc = document.getElementById('room-desc').value.trim();
    const err = document.getElementById('room-error');

    if (!number || !price || price <= 0) { err.textContent = 'Заполните все поля корректно'; return; }

    if (editingRoomId) {
      DB.updateRoom(editingRoomId, { number, type, price, description: desc });
      showToast('Номер обновлён');
    } else {
      DB.addRoom({ number, type, price, description: desc });
      showToast('Номер добавлен');
    }

    closeRoomModal();
    renderRooms();
  }

  function deleteRoom(id) {
    if (!confirm('Удалить номер?')) return;
    DB.deleteRoom(id);
    renderRooms();
    showToast('Номер удалён');
  }

  function renderBookings() {
    const bookings = DB.getBookings();
    const tbody = document.getElementById('bookings-body');
    if (bookings.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#888">Заявок нет</td></tr>';
      return;
    }
    tbody.innerHTML = bookings.reverse().map(b => {
      const client = DB.getUsers().find(u => u.id === b.userId);
      const canApprove = b.status === 'ожидает';
      return `<tr>
        <td>${b.id}</td>
        <td>${client ? client.fio : '—'}</td>
        <td>${client ? client.phone : '—'}</td>
        <td>${b.roomNumber}</td>
        <td>${b.checkin}</td>
        <td>${b.checkout}</td>
        <td>${b.total.toLocaleString()} ₽</td>
        <td><span class="badge ${b.status === 'подтверждено' ? 'free' : b.status === 'отменено' || b.status === 'отклонено' ? 'busy' : 'pending'}">${b.status}</span></td>
        <td><div class="td-actions">
          ${canApprove ? `
            <button class="btn btn-success btn-sm" onclick="approveBooking(${b.id})">✓ Подтвердить</button>
            <button class="btn btn-danger btn-sm" onclick="rejectBooking(${b.id})">✗ Отклонить</button>
          ` : '—'}
        </div></td>
      </tr>`;
    }).join('');
  }

  function approveBooking(id) {
    const booking = DB.getBookings().find(b => b.id === id);
    DB.updateBooking(id, { status: 'подтверждено' });
    DB.updateRoom(booking.roomId, { status: 'занят' });
    DB.addNotification(booking.userId, `Ваша заявка на номер ${booking.roomNumber} подтверждена!`);
    renderBookings();
    showToast('Заявка подтверждена');
  }

  function rejectBooking(id) {
    const booking = DB.getBookings().find(b => b.id === id);
    DB.updateBooking(id, { status: 'отклонено' });
    DB.addNotification(booking.userId, `Ваша заявка на номер ${booking.roomNumber} отклонена.`);
    renderBookings();
    showToast('Заявка отклонена');
  }

  function renderClients() {
    const clients = DB.getUsers().filter(u => u.role === 'client');
    const bookings = DB.getBookings();
    const tbody = document.getElementById('clients-body');
    tbody.innerHTML = clients.map(c => {
      const count = bookings.filter(b => b.userId === c.id).length;
      return `<tr>
        <td>${c.id}</td>
        <td>${c.fio}</td>
        <td>${c.email}</td>
        <td>${c.phone || '—'}</td>
        <td>${count}</td>
      </tr>`;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Инициализация
  renderDashboard();

  // Обновление при фокусе
  window.addEventListener('focus', () => {
    if (document.getElementById('page-dashboard').classList.contains('active')) renderDashboard();
    if (document.getElementById('page-bookings').classList.contains('active')) renderBookings();
  });
</script>
</body>
</html>
